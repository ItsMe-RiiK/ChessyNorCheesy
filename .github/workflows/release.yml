name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git gtk3 opencv qt6-base libxtst curl tar

      - name: Build Project
        run: |
          make clean
          make
          make setup-stockfish

      - name: Package Release
        run: |
          mkdir -p ChessyNotCheesy_build_tmp
          cp -r release/ChessyNotCheesy images themes scripts bin launcher.sh README.md ChessyNotCheesy_build_tmp/
          cp scripts/install.sh scripts/uninstall.sh scripts/update.sh ChessyNotCheesy_build_tmp/
          rm -f ChessyNotCheesy_build_tmp/scripts/install.sh ChessyNotCheesy_build_tmp/scripts/uninstall.sh ChessyNotCheesy_build_tmp/scripts/update.sh
          mv ChessyNotCheesy_build_tmp ChessyNotCheesy
          tar -czvf ChessyNotCheesy-linux-x86_64.tar.gz ChessyNotCheesy

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ChessyNotCheesy-linux-x86_64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    name: Cleanup Old Releases
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Delete Older Releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 1
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
